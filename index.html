<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Camera</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, sans-serif; }
        
        /* 相機底層畫面 */
        #videoFeed {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
        }

        /* UI 遮罩層 */
        .ui-layer {
            position: absolute; inset: 0; z-index: 10;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
            pointer-events: none;
        }

        /* 頂部工具列 */
        .top-bar { height: 60px; display: flex; justify-content: space-around; align-items: center; color: white; background: rgba(0,0,0,0.2); pointer-events: auto; }

        /* 底部控制區 */
        .bottom-panel { background: rgba(0,0,0,0.4); padding-bottom: 20px; pointer-events: auto; }

        /* 變焦按鈕 */
        .zoom-wrap { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .zoom-btn { width: 35px; height: 35px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; color: white; font-size: 10px; display: flex; align-items: center; justify-content: center; }
        .zoom-btn.active { background: #fff; color: #000; }

        /* 快門 */
        .shutter-row { display: flex; justify-content: space-around; align-items: center; padding: 0 40px; }
        .shutter-btn { width: 70px; height: 70px; background: white; border-radius: 50%; border: 4px solid rgba(255,255,255,0.3); }
        .thumb { width: 45px; height: 45px; background: #333; border-radius: 8px; border: 1px solid #fff; }
        .flip { color: white; font-size: 25px; }

        /* 閃光特效 */
        #flash { position: fixed; inset: 0; background: white; z-index: 100; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <video id="videoFeed" autoplay playsinline></video>
    <div id="flash"></div>

    <div class="ui-layer">
        <div class="top-bar">
            <span>⚡️</span><span>HDR</span><span>LIVE</span><span>⏱</span><span>ᐁ</span>
        </div>

        <div class="bottom-panel">
            <div class="zoom-wrap">
                <div class="zoom-btn">0.5</div>
                <div class="zoom-btn active">1x</div>
                <div class="zoom-btn">2</div>
            </div>
            <div class="shutter-row">
                <div class="thumb"></div>
                <div class="shutter-btn" onclick="snap()"></div>
                <div class="flip">🔄</div>
            </div>
        </div>
    </div>

    <script>
        const v = document.getElementById('videoFeed');
        // 啟動鏡頭
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(s => v.srcObject = s)
            .catch(e => alert("請至系統設定開啟相機權限"));

        function snap() {
            const f = document.getElementById('flash');
            f.style.opacity = '1';
            setTimeout(() => f.style.opacity = '0', 100);
        }
    </script>
</body>
</html>
