<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>iPhone Home</title>

    <style>
        :root {
            --bg-color: #1c1c1c; /* 接近圖片中的深色背景 */
            --icon-size: 60px;
            --icon-radius: 14px;
            --dock-bg: rgba(255, 255, 255, 0.2);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 主桌面容器 */
        .home-screen {
            flex: 1;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(6, 1fr); /* 預留空間給上方 Widget 或 App */
            gap: 20px;
            padding: 60px 25px 0 25px; /* 避開頂部時間列位置 */
            box-sizing: border-box;
        }

        /* App 圖示包裝 */
        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* App 色塊圖示 (你可以之後換成 <img>) */
        .app-icon {
            width: var(--icon-size);
            height: var(--icon-size);
            border-radius: var(--icon-radius);
            background-color: #555; /* 預設色塊 */
            margin-bottom: 5px;
            background-size: cover;
            background-position: center;
        }

        .app-name {
            color: white;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        /* 下方 Dock 欄位 */
        .dock-container {
            width: 90%;
            height: 95px;
            background-color: var(--dock-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 35px;
            margin-bottom: 30px; /* 與螢幕底部的距離 */
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding: 0 10px;
        }

        /* 隱藏搜尋按鈕 */
        .search-pill {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 15px;
        }

        /* 預設幾個不同的色塊 */
        .bg-red { background-color: #ff3b30; }
        .bg-blue { background-color: #007aff; }
        .bg-green { background-color: #34c759; }
        .bg-gray { background-color: #8e8e93; }

    </style>
</head>
<body>

    <div class="home-screen">
        <div class="app-item">
            <div class="app-icon bg-gray"></div>
            <div class="app-name">照片</div>
        </div>
        <div class="app-item">
            <div class="app-icon bg-blue"></div>
            <div class="app-name">相機</div>
        </div>
        <div class="app-item">
            <div class="app-icon bg-gray"></div>
            <div class="app-name">設定</div>
        </div>
        <div class="app-item">
            <div class="app-icon bg-blue"></div>
            <div class="app-name">檔案</div>
        </div>

        <div class="app-item">
            <div class="app-icon bg-gray"></div>
            <div class="app-name">計算機</div>
        </div>
        <div class="app-item">
            <div class="app-icon bg-gray"></div>
            <div class="app-name">Abracadabra</div>
        </div>
        <div class="app-item">
            <div class="app-icon bg-blue"></div>
            <div class="app-name">App Store</div>
        </div>
        <div class="app-item">
            <div class="app-icon bg-red"></div>
            <div class="app-name">健康</div>
        </div>
    </div>

    <div class="search-pill">搜尋</div>

    <div class="dock-container">
        <div class="app-icon bg-green"></div>
        <div class="app-icon bg-gray"></div>
        <div class="app-icon bg-gray"></div>
        <div class="app-icon bg-blue"></div>
    </div>

</body>
</html>
