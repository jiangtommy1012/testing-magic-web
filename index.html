<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Magic Home Screen</title>

    <style>
        :root {
            --bg-color: #1a1a1a; 
            --icon-size: 62px;
            --icon-radius: 14px;
            --dock-bg: rgba(255, 255, 255, 0.25);
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: -apple-system, "SF Pro Text", sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* App 網格佈局 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px 15px;
            padding: 70px 25px 0 25px; 
        }

        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-icon {
            width: var(--icon-size);
            height: var(--icon-size);
            border-radius: var(--icon-radius);
            background-color: #444; 
            margin-bottom: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .app-label {
            color: var(--text-color);
            font-size: 11px;
            white-space: nowrap;
        }

        /* 搜尋按鈕 */
        .search-bar {
            position: absolute;
            bottom: 125px; 
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 4px 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
        }

        /* --- 核心改動：滿版透明容器 --- */
        .dock-wrapper {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;       /* 100% 寬度是突破 Safe Area 限制的關鍵 */
            height: 110px;     /* 容器高度 */
            display: flex;
            justify-content: center;
            align-items: flex-end; /* 讓內層 Dock 靠下 */
            padding-bottom: 0px;  /* 調整這裡來控制 Dock 與螢幕底部的物理距離 */
            pointer-events: none;  /* 容器不擋點擊，讓後方背景可點（如果有） */
        }

        .dock {
            pointer-events: auto; /* 恢復 Dock 區域的點擊 */
            width: 92%;           /* 視覺上的 Dock 寬度 */
            height: 94px;         /* 視覺上的 Dock 高度 */
            background-color: var(--dock-bg);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-radius: 35px;  /* 四周圓角 */
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding: 0 10px;
            /* 物理黑科技：增加一個向下的陰影補色，防止極端情況下的白線 */
            box-shadow: 0 10px 0 0 var(--dock-bg); 
        }

        /* 圖示樣式 */
        .icon-photos { background: #fff; }
        .icon-camera { background: #333; }
        .icon-appstore { background: #007aff; }
        .icon-phone { background: #34c759; }

    </style>
</head>
<body>

    <div class="grid-container">
        <div class="app-item"><div class="app-icon icon-photos"></div><div class="app-label">照片</div></div>
        <div class="app-item"><div class="app-icon icon-camera"></div><div class="app-label">相機</div></div>
        <div class="app-item"><div class="app-icon" style="background-color: #8e8e93;"></div><div class="app-label">設定</div></div>
        <div class="app-item"><div class="app-icon icon-appstore"></div><div class="app-label">App Store</div></div>
        <div class="app-item"><div class="app-icon" style="background-color: #555;"></div><div class="app-label">計算機</div></div>
        <div class="app-item"><div class="app-icon" style="background: #5e5e5e; display: flex; align-items: center; justify-content: center; color: white;">A</div><div class="app-label">Abracadabra</div></div>
    </div>

    <div class="search-bar">
        <span style="color: rgba(255,255,255,0.8); font-size: 12px;">🔍 搜尋</span>
    </div>

    <div class="dock-wrapper">
        <div class="dock">
            <div class="app-icon icon-phone"></div>
            <div class="app-icon" style="background-color: #8e8e93;"></div>
            <div class="app-icon" style="background-color: #fff;"></div>
            <div class="app-icon" style="background-color: #007aff;"></div>
        </div>
    </div>

</body>
</html>
