<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>沙灘畫布</title>

    <style>
        :root {
            /* 底層濕沙色 */
            --wet-sand: #8b7355; 
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--wet-sand);
            touch-action: none; /* 禁用瀏覽器預設手勢，確保畫布流暢 */
        }

        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            /* 這裡放入撥開沙子後看到的底圖，可以是純色或另一張圖 */
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                              url('https://www.transparenttextures.com/patterns/dark-leather.png'); 
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* 提示文字 */
        .instruction {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-family: sans-serif;
            pointer-events: none;
            z-index: 10;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="instruction">在沙子上寫字吧...</div>

    <div id="canvas-container">
        <canvas id="sandCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('sandCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        // 初始化畫布尺寸
        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // 繪製初始沙子層
            drawSandLayer();
        }

        function drawSandLayer() {
            // 填滿底色（乾沙色）
            ctx.fillStyle = '#c2b280'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 加入沙子雜點紋理
            for (let i = 0; i < 5000; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 2;
                ctx.fillStyle = 'rgba(0,0,0,0.05)';
                ctx.fillRect(x, y, size, size);
            }
            
            // 加入些微的光影感
            const gradient = ctx.createRadialGradient(
                canvas.width/2, canvas.height/2, 0,
                canvas.width/2, canvas.height/2, canvas.width
            );
            gradient.addColorStop(0, 'rgba(255,255,255,0.1)');
            gradient.addColorStop(1, 'rgba(0,0,0,0.05)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // 開始撥開沙子
        function startDrawing(e) {
            isDrawing = true;
            const pos = getPosition(e);
            [lastX, lastY] = [pos.x, pos.y];
            
            // 隱藏提示
            document.querySelector('.instruction').style.opacity = '0';
        }

        // 撥動過程
        function draw(e) {
            if (!isDrawing) return;
            const pos = getPosition(e);

            ctx.beginPath();
            // 核心功能：這行會讓筆觸變成透明「挖空」畫布
            ctx.globalCompositeOperation = 'destination-out';
            
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            
            // 設定筆觸寬度（撥開的寬度）與圓角
            ctx.lineWidth = 35;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            // 加入模糊效果讓邊緣像沙子滑落
            ctx.shadowBlur = 4;
            ctx.shadowColor = 'black';
            
            ctx.stroke();

            [lastX, lastY] = [pos.x, pos.y];
        }

        function stopDrawing() {
            isDrawing = false;
        }

        // 取得觸碰座標
        function getPosition(e) {
            let x, y;
            if (e.touches && e.touches.length > 0) {
                x = e.touches[0].clientX;
                y = e.touches[0].clientY;
            } else {
                x = e.clientX;
                y = e.clientY;
            }
            return { x, y };
        }

        // 監聽事件
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startDrawing(e);
        }, { passive: false });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            draw(e);
        }, { passive: false });
        
        canvas.addEventListener('touchend', stopDrawing);

        window.addEventListener('resize', initCanvas);

        // 初始執行
        initCanvas();
    </script>
</body>
</html>
