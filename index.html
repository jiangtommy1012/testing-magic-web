<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="System">

    <title>System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --ios-bg: #000000;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* 主螢幕容器：移除 padding-top 讓背景填滿頂部 */
        .iphone-screen {
            width: 100%; height: 100%;
            background: var(--ios-bg);
            position: relative;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* 1. 移除狀態列 (status-bar)，僅保留一個隱形的頂部緩衝 */
        .top-gap {
            height: env(safe-area-inset-top);
            width: 100%;
        }

        /* Swiper 容器：調整高度計算，讓桌面 App 稍微往下移避開動態島 */
        .swiper { width: 100%; height: calc(100% - 130px); } 
        .swiper-slide { display: flex; justify-content: center; align-items: flex-start; }
        
        .app-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            padding: 40px 15px; /* 增加頂部間距，視覺上更平衡 */
            grid-gap: 25px 15px; width: 100%;
            pointer-events: auto;
        }

        .app { text-align: center; cursor: pointer; transition: transform 0.1s; pointer-events: auto; }
        .app:active { transform: scale(0.9); } 
        .icon {
            width: 60px; height: 60px; border-radius: 14px;
            background-size: cover; margin: 0 auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            pointer-events: none;
        }
        .app-label {
            color: white; font-size: 11px; margin-top: 6px;
            display: block; text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        /* 2. 微調底座 (Dock) 距離 */
        .dock {
            position: absolute; 
            /* 調整 bottom，原為 10px，這裡稍微往上移 */
            bottom: calc(25px + env(safe-area-inset-bottom)); 
            left: 10px; right: 10px;
            height: 95px; background: rgba(255,255,255,0.25);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 35px;
            display: grid; grid-template-columns: repeat(4, 1fr);
            padding: 10px; align-items: center; justify-items: center;
            z-index: 5;
        }

        /* 當機特效 */
        .crash-overlay {
            position: fixed; inset: 0; background: red;
            z-index: 999; display: none;
        }
    </style>
</head>
<body>

    <div class="crash-overlay" id="crashScreen"></div>

    <div class="iphone-screen">
        <div class="top-gap"></div>

        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <div class="app-grid">
                        <div class="app" onclick="triggerCrash()">
                            <div class="icon" style="background-color: #ff3b30;"></div>
                            <span class="app-label">音樂</span>
                        </div>
                        <div class="app"><div class="icon" style="background-color: #4cd964;"></div><span class="app-label">照片</span></div>
                        <div class="app"><div class="icon" style="background-color: #5856d6;"></div><span class="app-label">FaceTime</span></div>
                        <div class="app"><div class="icon" style="background-color: #8e8e93;"></div><span class="app-label">設定</span></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="dock">
            <div class="app"><div class="icon" style="background-color: #ff9500;"></div></div>
            <div class="app"><div class="icon" style="background-color: #33a6ff;"></div></div>
            <div class="app"><div class="icon" style="background-color: #fff;"></div></div>
            <div class="app"><div class="icon" style="background-color: #4cd964;"></div></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        var swiper = new Swiper(".mySwiper", {
            direction: 'horizontal',
            loop: false,
            pointerEvents: 'auto',
        });

        function triggerCrash() {
            document.getElementById('crashScreen').style.display = 'block';
            setTimeout(() => {
                alert('系統發生嚴重錯誤：0x8892');
            }, 100);
        }

        document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
    </script>
</body>
</html>
