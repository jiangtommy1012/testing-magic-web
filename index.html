<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Home Screen</title>

    <style>
        :root {
            --bg-color: #1a1a1a; 
            --icon-size: 62px;
            --icon-radius: 14px;
            --dock-bg: rgba(255, 255, 255, 0.25);
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
            overflow: hidden; /* 防止橡皮筋滾動影響視覺 */
            position: relative;
        }

        /* 主畫面 App 網格 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px 15px;
            padding: 70px 25px 0 25px; 
        }

        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .app-icon {
            width: var(--icon-size);
            height: var(--icon-size);
            border-radius: var(--icon-radius);
            background-color: #444; 
            margin-bottom: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            background-size: cover;
            background-position: center;
            position: relative; /* 為了讓通知紅點可以使用 absolute 定位 */
        }

        .app-label {
            color: var(--text-color);
            font-size: 11px;
            font-weight: 400;
            white-space: nowrap;
        }

        /* 搜尋按鈕 - 隨 Dock 位置下調 */
        .search-bar {
            position: absolute;
            bottom: 115px; 
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 4px 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .search-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
        }

        /* 下方 Dock - 突破安全區域限制版 */
        .dock {
            position: absolute; /* 脫離流，對應 body 定位 */
            bottom: -35px;      /* 負值位移：讓 Dock 底端「沉」入螢幕外 */
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            height: 120px;     /* 增加總高度，確保背景色塊延伸到底部 */
            background-color: var(--dock-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 35px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            /* 關鍵補償：用 padding 把圖示頂回螢幕視野內 */
            padding: 0 10px 35px 10px; 
            z-index: 999;
        }

        /* 特殊圖示樣式 */
        .icon-system { background: #5e5e5e; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 24px;}
        .icon-photos { background: #fff; }
        .icon-camera { background: #333; }
        .icon-appstore { background: #007aff; }
        .icon-phone { background: #34c759; }

    </style>
</head>
<body>

    <div class="grid-container">
        <div class="app-item">
            <div class="app-icon icon-photos"></div>
            <div class="app-label">照片</div>
        </div>
        <div class="app-item">
            <div class="app-icon icon-camera"></div>
            <div class="app-label">相機</div>
        </div>
        <div class="app-item">
            <div class="app-icon" style="background-color: #8e8e93;"></div>
            <div class="app-label">設定</div>
        </div>
        <div class="app-item">
            <div class="app-icon icon-appstore"></div>
            <div class="app-label">App Store</div>
        </div>

        <div class="app-item">
            <div class="app-icon" style="background-color: #555;"></div>
            <div class="app-label">計算機</div>
        </div>
        <div class="app-item">
            <div class="app-icon icon-system">A</div>
            <div class="app-label">Abracadabra</div>
        </div>
    </div>

    <div class="search-bar">
        <span class="search-text">🔍 搜尋</span>
    </div>

    <div class="dock">
        <div class="app-icon icon-phone"></div>
        <div class="app-icon" style="background-color: #8e8e93;"></div>
        <div class="app-icon" style="background-color: #fff;"></div>
        <div class="app-icon" style="background-color: #007aff;"></div>
    </div>

</body>
</html>
