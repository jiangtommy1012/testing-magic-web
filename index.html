<style>
    :root {
        /* 測試用：背景改為純白色 */
        --test-bg: #ffffff;
        --dock-debug-color: rgba(255, 0, 0, 0.3); /* 紅色透明，方便看 Dock 範圍 */
    }

    * { box-sizing: border-box; }

    body, html {
        margin: 0; padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: fixed;
        /* 改為白色背景 */
        background-color: var(--test-bg);
    }

    /* 頂部空間 */
    .top-spacer {
        height: calc(50px + env(safe-area-inset-top));
        background-color: #f0f0f0; /* 淺灰色標示頂部區域 */
    }

    /* App 網格 */
    .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-gap: 25px 15px;
        padding: 10px 25px;
    }

    .icon {
        width: 60px; height: 60px;
        border-radius: 14px;
        background-color: #ddd; /* 灰色佔位圖示 */
    }

    /* [關鍵測試點]：Dock 區域 */
    .dock-container {
        position: absolute;
        bottom: 0; 
        left: 0;
        width: 100%;
        /* 如果這裡有縫隙，你會看到 Body 的白色背景。
           我們加上負邊距補償，並讓高度稍微溢出物理螢幕。
        */
        height: calc(100px + env(safe-area-inset-bottom)); 
        
        /* 暫時改用半透明紅色，方便你觀察它有沒有「貼地」 */
        background: var(--dock-debug-color);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        padding: 15px 25px env(safe-area-inset-bottom);
        
        /* 頂部劃一條黑線，看 Dock 的起點 */
        border-top: 2px solid #ff0000;
    }
</style>
