<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            /* 1. 在這裡填入你的桌布 Base64 */
            --wallpaper: url('data:image/png;base64,貼在這裡');
        }

        body, html {
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh;
            overflow: hidden;
            background: #000 var(--wallpaper) no-repeat center center / cover;
            font-family: -apple-system, sans-serif;
        }

        /* 頂部避開真正的系統狀態列 */
        .top-spacer { 
            height: calc(55px + env(safe-area-inset-top)); 
        }

        /* App 圖示網格 */
        .grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            grid-gap: 20px 15px; padding: 10px 25px;
        }
        .app { display: flex; flex-direction: column; align-items: center; }
        .icon {
            width: 60px; height: 60px; border-radius: 14px;
            background-color: rgba(255,255,255,0.1); /* 預設灰色 */
            background-size: cover; margin-bottom: 5px;
        }
        .label { color: #fff; font-size: 11px; font-weight: 500; text-align: center; }

        /* 修正後的底部 Dock */
        .dock {
            position: absolute; 
            bottom: 0; /* 強制貼齊底部邊緣 */
            left: 0; width: 100%;
            /* 稍微加高以確保延伸至螢幕最底 */
            height: calc(95px + env(safe-area-inset-bottom)); 
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            display: grid; grid-template-columns: repeat(4, 1fr);
            padding: 15px 25px env(safe-area-inset-bottom);
            box-sizing: border-box;
            /* 移除多餘的邊框或陰影 */
            border-top: 0.5px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="top-spacer"></div>
    <div class="grid" id="homeGrid"></div>
    <div class="dock" id="dockBar"></div>

    <script>
        // 你可以把 App 的圖示也轉成 Base64 填在這裡
        const apps = [
            { name: "照片", icon: "" },
            { name: "設定", icon: "" },
            { name: "相機", icon: "" },
            { name: "預言", icon: "" }
        ];

        const target = document.getElementById('homeGrid');
        apps.forEach(app => {
            const div = document.createElement('div');
            div.className = 'app';
            div.innerHTML = `<div class="icon" style="background-image: url('${app.icon}')"></div><div class="label">${app.name}</div>`;
            target.appendChild(div);
        });

        // 底部四個常用 App
        const dockApps = [ {icon:""}, {icon:""}, {icon:""}, {icon:""} ];
        const dockTarget = document.getElementById('dockBar');
        dockApps.forEach(app => {
            const div = document.createElement('div');
            div.className = 'app';
            div.innerHTML = `<div class="icon" style="background-image: url('${app.icon}')"></div>`;
            dockTarget.appendChild(div);
        });
    </script>
</body>
</html>
