<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>真實沙灘畫布</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #d2b48c;
            touch-action: none;
        }
        #sandCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
    </style>
</head>
<body>

<canvas id="sandCanvas"></canvas>

<script>
    const canvas = document.getElementById('sandCanvas');
    const ctx = canvas.getContext('2d');
    
    let isDrawing = false;
    let lastX = 0;
    let lastY = 0;

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        drawBaseSand();
    }

    function drawBaseSand() {
        // 1. 填滿沙子基色
        ctx.fillStyle = '#c2b280';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. 加入微小的沙粒雜訊 (模擬你照片中的顆粒感)
        for (let i = 0; i < 10000; i++) {
            const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height;
            const size = Math.random() * 1.5;
            ctx.fillStyle = i % 2 === 0 ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.05)';
            ctx.fillRect(x, y, size, size);
        }
    }

    function startDrawing(e) {
        isDrawing = true;
        const { x, y } = getPos(e);
        [lastX, lastY] = [x, y];
    }

    function draw(e) {
        if (!isDrawing) return;
        const { x, y } = getPos(e);

        // --- 核心物理視覺效果：模擬沙子撥開 ---
        
        // 1. 繪製「凹陷處」（深色、濕沙色）
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(100, 80, 50, 0.4)'; // 濕沙深色
        ctx.lineWidth = 30;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.shadowBlur = 0; // 清除之前的陰影
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.stroke();

        // 2. 繪製「堆積邊緣」（亮色、受光面）
        // 稍微往左上方偏移一點點，模擬陽光照射在被撥開的沙堆上
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)'; 
        ctx.lineWidth = 28;
        ctx.lineCap = 'round';
        ctx.moveTo(lastX - 2, lastY - 2);
        ctx.lineTo(x - 2, y - 2);
        ctx.stroke();

        // 3. 繪製「深層陰影」（讓凹陷看起來更深）
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
        ctx.lineWidth = 10;
        ctx.lineCap = 'round';
        ctx.moveTo(lastX + 3, lastY + 3);
        ctx.lineTo(x + 3, y + 3);
        ctx.stroke();

        [lastX, lastY] = [x, y];
    }

    function getPos(e) {
        const t = e.touches ? e.touches[0] : e;
        return { x: t.clientX, y: t.clientY };
    }

    function stop() { isDrawing = false; }

    // 事件監聽
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stop);
    
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        startDrawing(e);
    }, { passive: false });
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        draw(e);
    }, { passive: false });
    canvas.addEventListener('touchend', stop);

    window.addEventListener('resize', init);
    init();
</script>

</body>
</html>
