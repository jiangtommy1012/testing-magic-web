<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Home Screen</title>

    <style>
        :root {
            --bg-color: #1a1a1a; 
            --icon-size: 62px;
            --icon-radius: 14px;
            --dock-bg: rgba(255, 255, 255, 0.25);
            --text-color: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            font-family: -apple-system, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px 15px;
            padding: 70px 25px 0 25px;
        }

        .app-item { display: flex; flex-direction: column; align-items: center; }

        .app-icon {
            width: var(--icon-size); height: var(--icon-size);
            border-radius: var(--icon-radius);
            background-color: #444; margin-bottom: 6px;
            background-size: cover; background-position: center;
        }

        .app-label { color: var(--text-color); font-size: 11px; }

        /* 搜尋按鈕 */
        .search-bar {
            position: absolute;
            bottom: 140px; 
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 4px 14px; border-radius: 20px;
        }

        /* 關鍵：滿版隱形底座，欺騙 iOS 不要裁切 */
        .fake-safe-area-provider {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%; /* 100% 寬度是關鍵 */
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* 讓 Dock 靠下 */
            padding-bottom: 10px;  /* 調整這個值來決定 Dock 離螢幕底部多近 */
            background: transparent; /* 保持透明 */
            pointer-events: none;
        }

        .dock {
            pointer-events: auto;
            width: 92%;
            height: 94px;
            background-color: var(--dock-bg);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 35px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding: 0 10px;
        }

        /* 色塊示範 */
        .icon-photos { background: #fff; }
        .icon-camera { background: #333; }
        .icon-system { background: #5e5e5e; display: flex; align-items: center; justify-content: center; color: white; }

    </style>
</head>
<body>

    <div class="grid-container">
        <div class="app-item"><div class="app-icon icon-photos"></div><div class="app-label">照片</div></div>
        <div class="app-item"><div class="app-icon icon-camera"></div><div class="app-label">相機</div></div>
        <div class="app-item"><div class="app-icon" style="background-color: #8e8e93;"></div><div class="app-label">設定</div></div>
        <div class="app-item"><div class="app-icon" style="background-color: #007aff;"></div><div class="app-label">檔案</div></div>
        <div class="app-item"><div class="app-icon" style="background-color: #555;"></div><div class="app-label">計算機</div></div>
        <div class="app-item"><div class="app-icon icon-system">A</div><div class="app-label">Abracadabra</div></div>
    </div>

    <div class="search-bar"><span style="color:white; font-size:12px;">🔍 搜尋</span></div>

    <div class="fake-safe-area-provider">
        <div class="dock">
            <div class="app-icon" style="background-color: #34c759;"></div>
            <div class="app-icon" style="background-color: #8e8e93;"></div>
            <div class="app-icon" style="background-color: #fff;"></div>
            <div class="app-icon" style="background-color: #007aff;"></div>
        </div>
    </div>

</body>
</html>
