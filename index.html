<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Home Screen</title>

    <style>
        :root {
            /* 背景圖路徑 */
            --bg-image: url('images/wallpaper.jpg');
            
            /* 尺寸與顏色變數 */
            --icon-size: 62px;
            --icon-radius: 14px;
            --dock-bg: rgba(255, 255, 255, 0.25);
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* 移除點擊高亮 */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh; /* 解決底部留白問題 */
            overflow: hidden; /* 防止內容溢出滾動 */
            
            /* 背景設定 */
            background-color: #1a1a1a;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* 鎖定行為 */
            overscroll-behavior: none; 
            touch-action: none; 
            
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            position: relative;
        }

        /* App 網格佈局 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px 15px;
            padding: 75px 25px 0 25px; 
        }

        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .app-icon {
            width: var(--icon-size);
            height: var(--icon-size);
            border-radius: var(--icon-radius);
            margin-bottom: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .app-label {
            color: var(--text-color);
            font-size: 11px;
            font-weight: 400;
            white-space: nowrap;
        }

        /* 搜尋按鈕 */
        .search-bar {
            position: fixed;
            bottom: 125px; 
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 4px 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
        }

        /* --- 下方 Dock --- */
        .dock {
            position: fixed;
            bottom: 15px; /* 依照你的要求改為 10px */
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            height: 94px;
            background-color: var(--dock-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 34px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding: 0 10px;
            z-index: 999;
        }

        /* --- 各個 Icon 圖片設定 --- */
        .icon-photos { background-image: url('images/icon-photos.png'); background-color: #fff; }
        .icon-camera { background-image: url('images/icon-camera.png'); background-color: #fff; }
        .icon-setting { background-image: url('images/icon-setting.png'); background-color: #8e8e93; }
        .icon-files { background-image: url('images/icon-files.png'); background-color: #007aff; }
        .icon-calculator { background-image: url('images/icon-calculator.png'); background-color: #555; }
        .icon-abr { background-image: url('images/icon-abr.png'); background-color: #5e5e5e; }
        .icon-appstore { background-image: url('images/icon-appstore.png'); background-color: #007aff; }
        .icon-health { background-image: url('images/icon-health.png'); background-color: #fff; }
        .icon-phone { background-image: url('images/icon-phone.png'); background-color: #34c759; }

    </style>
</head>
<body scroll="no">

    <div class="grid-container">
        <div class="app-item">
            <div class="app-icon icon-photos"></div>
            <div class="app-label">照片</div>
        </div>
        <div class="app-item">
            <div class="app-icon icon-camera"></div>
            <div class="app-label">相機</div>
        </div>
        <div class="app-item">
            <div class="app-icon icon-setting"></div>
            <div class="app-label">設定</div>
        </div>
        <div class="app-item">
            <div class="app-icon icon-files"></div>
            <div class="app-label">檔案</div>
        </div>

        <div class="app-item">
            <div class="app-icon icon-calculator"></div>
            <div class="app-label">計算機</div>
        </div>
        <div class="app-item">
            <div class="app-icon icon-abr"></div>
            <div class="app-label">Abracadabra</div>
        </div>
        <div class="app-item">
            <div class="app-icon icon-appstore"></div>
            <div class="app-label">App Store</div>
        </div>
        <div class="app-item">
            <div class="app-icon icon-health"></div>
            <div class="app-label">健康</div>
        </div>
    </div>

    <div class="search-bar">
        <span style="color: rgba(255,255,255,0.9); font-size: 12px;">🔍 搜尋</span>
    </div>

    <div class="dock">
        <div class="app-icon icon-phone"></div>
        <div class="app-icon icon-setting"></div>
        <div class="app-icon icon-photos"></div>
        <div class="app-icon icon-files"></div>
    </div>

    <script>
        // 阻止整個頁面的觸控滑動行為
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        // 如果未來有需要點擊 App Icon 觸發魔術，可以在這裡加上監聽
        console.log("iOS Home Screen 模擬器已啟動，滑動已鎖定。");
    </script>

</body>
</html>
