<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>iPhone Interface</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --dock-bg: rgba(255, 255, 255, 0.25);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: -apple-system, sans-serif;
        }

        /* 這裡是主畫面內容，會隨內容捲動 (如果是長頁面的話) */
        .content {
            padding: 70px 25px;
        }

        /* Fixed: 永遠釘在底部，無視捲動 */
        .dock {
            position: fixed;
            bottom: -8px; /* 使用負值強制下壓 */
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            height: 100px; /* 稍微加高，配合負值 bottom */
            background-color: var(--dock-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 34px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding-bottom: 8px; /* 補回負值的空間，讓圖示不要被切掉 */
            z-index: 999;
        }

        .app-icon {
            width: 62px;
            height: 62px;
            border-radius: 14px;
            background-color: #555;
            position: relative; /* 為了讓內部的通知圓點可以用 absolute */
        }

        /* Absolute: 相對於 app-icon 定位 */
        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="content">
        </div>

    <div class="dock">
        <div class="app-icon" style="background-color: #34c759;">
            <div class="badge">1</div> </div>
        <div class="app-icon"></div>
        <div class="app-icon"></div>
        <div class="app-icon" style="background-color: #007aff;"></div>
    </div>

</body>
</html>
